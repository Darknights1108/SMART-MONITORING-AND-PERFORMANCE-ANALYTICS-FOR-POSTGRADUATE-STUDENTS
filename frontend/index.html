<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postgraduate Monitoring System - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <h1 id="login-title">Postgraduate Monitoring System</h1>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field">
          <label for="staffId">Username / Email:</label>
          <input
            id="staffId"
            name="staffId"
            type="text"
            autocomplete="username"
            placeholder="ADM001"
            required
          >
        </div>

        <div class="field">
          <label for="password">Password:</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          >
        </div>

        <p id="errorMessage" class="error-message" role="alert" aria-live="polite"></p>

        <button id="loginButton" type="submit">LOGIN</button>
      </form>

      <p class="support-text">
        For assistance, contact IT Support: support@mmu.edu.my
      </p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
