services:
  # ── MariaDB ──
  mariadb:
    image: mariadb:11
    container_name: datatrain-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: datatrain
      MYSQL_USER: datatrain
      MYSQL_PASSWORD: datatrain_secret
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (LLM) ──
  ollama:
    image: ollama/ollama:latest
    container_name: datatrain-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datatrain-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      mariadb:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app

  # ── Mailpit (SMTP test server) ──
  mailpit:
    image: axllent/mailpit:latest
    container_name: datatrain-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

  # ── Frontend (Next.js) - Phase 2 ──
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: datatrain-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000
  #     NEXT_PUBLIC_WS_URL: ws://localhost:8000
  #   depends_on:
  #     - backend

volumes:
  mariadb_data:
  ollama_data:
