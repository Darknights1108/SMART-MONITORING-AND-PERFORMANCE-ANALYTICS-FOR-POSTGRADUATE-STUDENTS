<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataTrain Agent Test</title>
<style>
  body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1e1e1e; color: #d4d4d4; }
  h2 { color: #569cd6; }
  #log { background: #252526; border: 1px solid #3c3c3c; padding: 12px; height: 400px; overflow-y: auto; margin: 10px 0; border-radius: 4px; }
  .msg-user { color: #9cdcfe; } .msg-agent { color: #b5cea8; } .msg-system { color: #6a9955; } .msg-error { color: #f44747; } .msg-thinking { color: #c586c0; }
  input, textarea { width: 100%; box-sizing: border-box; background: #3c3c3c; border: 1px solid #555; color: #d4d4d4; padding: 8px; border-radius: 4px; margin: 4px 0; }
  button { background: #0e639c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 4px 2px; }
  button:hover { background: #1177bb; } button:disabled { background: #555; cursor: default; }
  #status { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 12px; margin-left: 10px; }
  .connected { background: #1e4620; color: #89d185; } .disconnected { background: #4e1e1e; color: #f44747; }
  label { font-size: 12px; color: #888; }
</style>
</head>
<body>
<h2>DataTrain Agent Chat Test</h2>

<label>Staff ID</label>
<input id="staffId" value="ADM001" style="width:120px">
<label style="margin-left:10px">Password</label>
<input id="password" type="password" value="password123" style="width:120px">
<button onclick="login()">Login & Connect</button>
<span id="status" class="disconnected">Disconnected</span>

<div id="log"></div>

<textarea id="msgInput" rows="2" placeholder="Type your message... (Enter to send)" disabled></textarea>
<button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
<button onclick="clearLog()">Clear</button>

<p style="color:#555;font-size:12px">Try: "查询所有学生" / "列出逾期学生" / "给 Ali bin Hassan 起草一封提醒邮件，里程碑：RPD，语气：gentle"</p>

<script>
let ws = null;

function log(text, cls) {
  const div = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'msg-' + cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

async function login() {
  const staffId = document.getElementById('staffId').value;
  const password = document.getElementById('password').value;

  log('Logging in...', 'system');
  try {
    const res = await fetch('http://localhost:8000/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ staff_id: staffId, password: password })
    });
    const data = await res.json();
    if (!res.ok) { log('Login failed: ' + JSON.stringify(data), 'error'); return; }
    log(`Logged in as ${data.user.name} (${data.user.role})`, 'system');
    connect(data.access_token);
  } catch (e) { log('Login error: ' + e.message, 'error'); }
}

function connect(token) {
  if (ws) ws.close();
  ws = new WebSocket('ws://localhost:8000/ws/chat');

  ws.onopen = () => {
    log('WebSocket connected, authenticating...', 'system');
    ws.send(JSON.stringify({ token: token }));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'auth_success') {
      log(`Auth OK — session: ${data.session_id}`, 'system');
      document.getElementById('status').textContent = 'Connected';
      document.getElementById('status').className = 'connected';
      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
    } else if (data.type === 'thinking') {
      log('Agent is thinking...', 'thinking');
    } else if (data.type === 'message' || data.type === 'chart') {
      log('Agent: ' + data.message, 'agent');
    } else if (data.type === 'error') {
      log('Error: ' + data.message, 'error');
    }
  };

  ws.onclose = () => {
    log('Disconnected', 'system');
    document.getElementById('status').textContent = 'Disconnected';
    document.getElementById('status').className = 'disconnected';
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  };

  ws.onerror = (e) => log('WS Error: ' + e.message, 'error');
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg || !ws) return;
  log('You: ' + msg, 'user');
  ws.send(JSON.stringify({ message: msg }));
  input.value = '';
}

document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
